# ═══════════════════════════════════════════════════════════
# Agentic Finance — Production Docker Compose
# Domain: agt.finance | VPS: 37.27.190.158 (Hetzner)
#
# Deploy:  make deploy         (or ./deploy.sh)
# Status:  make status
# Logs:    make logs
# ═══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agtfi-db
    restart: always
    environment:
      POSTGRES_USER: paypol
      POSTGRES_PASSWORD: paypol_production_2024
      POSTGRES_DB: paypol_core
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - agtfi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paypol -d paypol_core"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dashboard (Next.js 16) ──────────────────────────────
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: agtfi-dashboard
    restart: always
    env_file:
      - ./apps/dashboard/.env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://paypol:paypol_production_2024@db:5432/paypol_core
      - AGENT_SERVICE_URL=http://agents:3001
    expose:
      - "3000"
    networks:
      - agtfi-net
      - coolify
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Agents Service (32 On-Chain AI Agents) ─────────────
  agents:
    build:
      context: ./services/agents
      dockerfile: Dockerfile
    container_name: agtfi-agents
    restart: always
    env_file:
      - ./apps/dashboard/.env.production
    environment:
      - NODE_ENV=production
      - AGENT_SERVICE_PORT=3001
      - AGENT_SERVICE_URL=http://agents:3001
      - RPC_URL=https://rpc.moderato.tempo.xyz
    expose:
      - "3001"
    networks:
      - agtfi-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── ZK Daemon (Shield & A2A Escrow Processor) ──────────
  daemon:
    build:
      context: .
      dockerfile: services/daemon/Dockerfile
    container_name: agtfi-daemon
    restart: always
    env_file:
      - ./apps/dashboard/.env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://paypol:paypol_production_2024@db:5432/paypol_core
      - RPC_URL=https://rpc.moderato.tempo.xyz
      - DASHBOARD_URL=http://dashboard:3000
      - SHIELD_V2_ADDRESS=0x3B4b47971B61cB502DD97eAD9cAF0552ffae0055
      - NEXUS_V2_ADDRESS=0x6A467Cd4156093bB528e448C04366586a1052Fab
      - TOKEN_ADDRESS=0x20c0000000000000000000000000000000000001
    networks:
      - agtfi-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'process.exit(0)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  pgdata:

networks:
  agtfi-net:
    driver: bridge
  coolify:
    external: true
